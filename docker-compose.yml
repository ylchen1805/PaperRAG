services:
  pgvector:
    image: pgvector/pgvector:pg16
    container_name: PaperRAG
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ragdb
    ports:
      - "5432:5432"
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ragdb"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgvector_data:
