name: Autograding Tests
on:
  - push
  - workflow_dispatch
  - repository_dispatch
permissions:
  checks: write
  actions: read
  contents: read
jobs:
  run-autograding-tests:
    runs-on: self-hosted
    container:
      image: python:3.10-slim
    if: github.actor != 'github-classroom[bot]'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Check data_update.py
      id: check-data-update
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check data_update.py
        setup-command: ''
        command: 'test -f data_update.py'
        timeout: 10
        max-score: 10

    - name: Check rag_query.py
      id: check-rag-query
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check rag_query.py
        setup-command: ''
        command: 'test -f rag_query.py'
        timeout: 10
        max-score: 10

    - name: Check data/ directory has at least 5 files
      id: check-data-dir
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check data/ directory has at least 5 files
        setup-command: ''
        command: 'test -d data && [ $(find data -type f | wc -l) -ge 5 ]'
        timeout: 10
        max-score: 15

    - name: Check requirements.txt
      id: check-requirements
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check requirements.txt
        setup-command: ''
        command: 'test -f requirements.txt'
        timeout: 10
        max-score: 10

    - name: Check .env.example exists and has no real API keys
      id: check-env-example
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Check .env.example exists and has no real API keys
        setup-command: ''
        command: 'test -f .env.example && ! grep -qE "[A-Za-z0-9]{40,}" .env.example'
        timeout: 10
        max-score: 15

    - name: Run data_update.py --help
      id: run-data-update-help
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Run python data_update.py --help
        setup-command: 'pip install -r requirements.txt -q'
        command: 'python data_update.py --help'
        timeout: 120
        max-score: 20

    - name: Run rag_query.py --help
      id: run-rag-query-help
      uses: classroom-resources/autograding-command-grader@v1
      with:
        test-name: Run python rag_query.py --help
        setup-command: 'pip install -r requirements.txt -q'
        command: 'python rag_query.py --help'
        timeout: 120
        max-score: 20

    - name: Autograding Reporter
      uses: classroom-resources/autograding-grading-reporter@v1
      env:
        CHECK-DATA-UPDATE_RESULTS: "${{ steps.check-data-update.outputs.result }}"
        CHECK-RAG-QUERY_RESULTS: "${{ steps.check-rag-query.outputs.result }}"
        CHECK-DATA-DIR_RESULTS: "${{ steps.check-data-dir.outputs.result }}"
        CHECK-REQUIREMENTS_RESULTS: "${{ steps.check-requirements.outputs.result }}"
        CHECK-ENV-EXAMPLE_RESULTS: "${{ steps.check-env-example.outputs.result }}"
        RUN-DATA-UPDATE-HELP_RESULTS: "${{ steps.run-data-update-help.outputs.result }}"
        RUN-RAG-QUERY-HELP_RESULTS: "${{ steps.run-rag-query-help.outputs.result }}"
      with:
        runners: check-data-update,check-rag-query,check-data-dir,check-requirements,check-env-example,run-data-update-help,run-rag-query-help
